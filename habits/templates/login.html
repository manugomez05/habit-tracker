<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Habit Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f6f7fb; margin: 0; padding: 0; color: #333; }
        .page { max-width: 1100px; margin: 32px auto; padding: 24px; background: #fff; box-shadow: 0 10px 24px rgba(0,0,0,0.08); border-radius: 12px; }
        .header { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 24px; }
        .card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 14px; padding: 20px; max-width: 400px; margin: 0 auto; }
        .card h3 { margin-top: 0; }
        .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
        .field label { font-weight: bold; font-size: 14px; }
        .field input { padding: 10px 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; outline: none; }
        .field input:focus { border-color: #2563eb; }
        .button { display: inline-block; width: 100%; padding: 10px 16px; border: none; border-radius: 8px; background: #2563eb; color: white; text-decoration: none; cursor: pointer; font-size: 15px; box-sizing: border-box; }
        .error { background: #fee2e2; border: 1px solid #fca5a5; color: #b91c1c; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
    </style>
</head>
<body>
    <section class="page">
        <div class="header">
            <div>
                <h1>Iniciar sesión</h1>
                <p>Ingresá tus credenciales para continuar.</p>
            </div>
        </div>

        <div class="card">
            <h3>Login</h3>

            {% if error %}
                <div class="error">
                    {{ error }}
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="field">
                    <label for="id_username">Usuario</label>
                    <input type="text" name="username" id="id_username" placeholder="Tu usuario" autofocus>
                </div>

                <div class="field">
                    <label for="id_password">Contraseña</label>
                    <input type="password" name="password" id="id_password" placeholder="Tu contraseña">
                </div>

                <button type="submit" class="button">Entrar</button>
            </form>

            <div style="text-align: center; margin-top: 16px; font-size: 14px;">
                ¿No tienes cuenta? <a href="{% url 'registro' %}" style="color: #2563eb; text-decoration: none;">Regístrate aquí</a>
            </div>
        </div>
    </section>
</body>
</html>
