<!DOCTYPE html>
<html>
<body>

<h1>Eliminar Persona</h1>

<p>¿Estás seguro de que quieres eliminar a <strong>{{ persona.nombre }} {{ persona.apellido }}</strong>?</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit">Sí, eliminar</button>
    <a href="{% url 'lista_personas' %}">
        <button type="button">Cancelar</button>
    </a>
</form>

</body>
</html>
