<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tareas</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f6f7fb; margin: 0; padding: 0; color: #333; }
        .page { max-width: 900px; margin: 32px auto; padding: 24px; background: #fff; box-shadow: 0 10px 24px rgba(0,0,0,0.08); border-radius: 12px; }
        h1 { margin-top: 0; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 24px; }
        .button { display: inline-block; padding: 10px 16px; border: none; border-radius: 8px; background: #2563eb; color: white; text-decoration: none; cursor: pointer; }
        .button.light { background: #e5e7eb; color: #111827; }
        .tarea-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 12px; }
        .tarea-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; border: 1px solid #e2e8f0; border-radius: 10px; background: #fafbff; }
        .tarea-meta { font-size: 1rem; font-weight: 600; }
        .tarea-desc { font-size: 0.9rem; color: #6b7280; margin-top: 4px; }
        .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .empty { color: #6b7280; }
    </style>
</head>
<body>
    <section class="page">
        <div class="toolbar">
            <div>
                <h1>Tareas</h1>
                <p>Administra tus tareas y objetivos.</p>
            </div>
            <a class="button" href="{% url 'crearTarea' %}">Crear tarea</a>
            <a class="button" href="{% url 'home' %}">Volver al Inicio</a>
        </div>
        <ul class="tarea-list">
            {% for tarea in tareas %}
                <li class="tarea-item">
                    <div>
                        <div class="tarea-meta">#{{ tarea.id }} · {{ tarea.titulo }}</div>
                        <div class="tarea-desc">{{ tarea.descripcion|truncatewords:15 }}</div>
                    </div>
                    <div class="actions">
                        <a class="button light" href="{% url 'verTarea' tarea.id %}">Ver</a>
                        <a class="button light" href="{% url 'modificarTarea' tarea.id %}">Editar</a>
                        <a class="button light" href="{% url 'eliminarTarea' tarea.id %}">Eliminar</a>
                    </div>
                </li>
            {% empty %}
                <li class="tarea-item empty">No hay tareas. Empieza creando una.</li>
            {% endfor %}
        </ul>
    </section>
</body>
</html>
