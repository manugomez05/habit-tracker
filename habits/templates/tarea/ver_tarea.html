<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarea {{ tarea.titulo }}</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f6f7fb; margin: 0; padding: 0; color: #333; }
        .page { max-width: 700px; margin: 32px auto; padding: 24px; background: #fff; box-shadow: 0 10px 24px rgba(0,0,0,0.08); border-radius: 12px; }
        h1 { margin-top: 0; }
        .card { padding: 18px 20px; border: 1px solid #e2e8f0; border-radius: 12px; background: #f8fafc; margin-bottom: 24px; }
        .data-row { margin-bottom: 12px; }
        .label { display: block; font-size: 0.95rem; color: #6b7280; margin-bottom: 4px; }
        .value { font-size: 1rem; font-weight: 600; }
        .buttons { display: flex; gap: 12px; flex-wrap: wrap; }
        .button { display: inline-block; padding: 10px 16px; border: none; border-radius: 8px; color: white; text-decoration: none; cursor: pointer; }
        .button.primary { background: #2563eb; }
        .button.light { background: #e5e7eb; color: #111827; }
        .button.danger { background: #dc2626; }
    </style>
</head>
<body>
    <section class="page">
        <h1>Tarea: {{ tarea.titulo }}</h1>
        <div class="card">
            <div class="data-row">
                <span class="label">Título</span>
                <span class="value">{{ tarea.titulo }}</span>
            </div>
            <div class="data-row">
                <span class="label">Descripción</span>
                <span class="value">{{ tarea.descripcion }}</span>
            </div>
            <div class="data-row">
                <span class="label">Grupo</span>
                <span class="value">{{ tarea.grupo.nombre }}</span>
            </div>
            <div class="data-row">
                <span class="label">Fecha de Creación</span>
                <span class="value">{{ tarea.fecha_creacion|date:"d/m/Y H:i" }}</span>
            </div>
        </div>
        <div class="buttons">
            <a class="button light" href="{% url 'lista_tareas' %}">Volver</a>
            <a class="button primary" href="{% url 'modificarTarea' tarea.id %}">Editar</a>
            <a class="button danger" href="{% url 'eliminarTarea' tarea.id %}">Eliminar</a>
        </div>
    </section>
</body>
</html>
