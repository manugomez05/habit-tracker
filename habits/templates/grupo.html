<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupos</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f6f7fb; margin: 0; padding: 0; color: #333; }
        .page { max-width: 900px; margin: 32px auto; padding: 24px; background: #fff; box-shadow: 0 10px 24px rgba(0,0,0,0.08); border-radius: 12px; }
        h1 { margin-top: 0; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 24px; }
        .button { display: inline-block; padding: 10px 16px; border: none; border-radius: 8px; background: #2563eb; color: white; text-decoration: none; cursor: pointer; }
        .button.light { background: #e5e7eb; color: #111827; }
        .group-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 12px; }
        .group-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; border: 1px solid #e2e8f0; border-radius: 10px; background: #fafbff; }
        .group-meta { font-size: 1rem; font-weight: 600; }
        .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .empty { color: #6b7280; }
    </style>
</head>
<body>
    <section class="page">
        <div class="toolbar">
            <div>
                <h1>Grupos</h1>
                <p>Administrar grupos y sus miembros.</p>
            </div>
            <a class="button" href="{% url 'crearGrupo' %}">Crear grupo</a>
        </div>
        <ul class="group-list">
            {% for grupo in grupos %}
                <li class="group-item">
                    <div class="group-meta">#{{ grupo.id }} · {{ grupo.nombre }}</div>
                    <div class="actions">
                        <a class="button light" href="{% url 'verGrupo' grupo.id %}">Ver</a>
                        <a class="button light" href="{% url 'modificarGrupo' grupo.id %}">Editar</a>
                        <a class="button light" href="{% url 'eliminarGrupo' grupo.id %}">Eliminar</a>
                    </div>
                </li>
            {% empty %}
                <li class="group-item empty">No hay grupos. Empieza creando uno.</li>
            {% endfor %}
        </ul>
    </section>
</body>
</html>
