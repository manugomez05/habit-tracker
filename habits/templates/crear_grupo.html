<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Grupo</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f6f7fb; margin: 0; padding: 0; color: #333; }
        .page { max-width: 600px; margin: 32px auto; padding: 24px; background: #fff; box-shadow: 0 10px 24px rgba(0,0,0,0.08); border-radius: 12px; }
        h1 { margin-top: 0; }
        form { display: grid; gap: 16px; }
        .buttons { display: flex; gap: 12px; flex-wrap: wrap; }
        .button { display: inline-block; padding: 10px 16px; border: none; border-radius: 8px; background: #2563eb; color: white; text-decoration: none; cursor: pointer; }
        .button.light { background: #e5e7eb; color: #111827; }
        label { font-weight: 600; }
        .form-field { padding: 14px 16px; border: 1px solid #d1d5db; border-radius: 8px; background: #f9fafb; }
    </style>
</head>
<body>
    <section class="page">
        <h1>Crear Grupo</h1>
        <p>Elige un nombre y selecciona los miembros que formarán parte del grupo.</p>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="buttons">
                <button class="button" type="submit">Guardar</button>
                <a class="button light" href="{% url 'lista_grupos' %}">Cancelar</a>
            </div>
        </form>
    </section>
</body>
</html>
